<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Hotel Reservas</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <aside class="sidebar">
        <h2>Hotel Reservas</h2>

        <a href="index.html" class="ativo">Quartos</a>
        <a href="#">Reservas</a>
        <a href="#">Sobre</a>
    </aside>

    <main>

        <div class="topo">
            <div>
                <h1>Quartos Cadastrados</h1>
                <p>Gerencie os quartos do hotel</p>
            </div>

            <button onclick="novoQuarto()">
                + Novo Quarto
            </button>
        </div>

        <table>

            <thead>
                <tr>
                    <th>Nº Quarto</th>
                    <th>Tipo</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody id="tabelaQuartos">
            </tbody>

        </table>

    </main>

</div>

<div id="modal" class="modal">

    <div class="modal-box">

        <div class="icone">
            !
        </div>

        <h2 id="tituloModal">
            Excluir Quarto
        </h2>

        <p id="textoModal">
            Deseja realmente excluir?
        </p>

        <div class="modal-botoes">

            <button
                class="btn-cancelar"
                onclick="fecharModal()">
                Cancelar
            </button>

            <button
                class="btn-excluir"
                onclick="confirmarExclusao()">
                Excluir
            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
